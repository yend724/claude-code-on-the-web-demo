name: Visual Diff

on:
  workflow_dispatch:

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run visual-diff
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff-screenshots
          path: screenshots/
