<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>Perf #420</title>
<style>

.wrap{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:2.5rem 3rem;min-width:320px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}

.label{font-size:.75rem;color:#aaa;margin-bottom:1.5rem}
.char{font-family:monospace;font-size:48px;color:#111;padding:1.5rem 2rem;background:#fafafa;border:1px solid #eee;border-radius:8px;display:inline-block;line-height:1.2}
</style></head>
<body>
<div class="wrap">
<div class="title">Perf #420</div>
<div class="label">monospace 48px</div>

</div>

</html>
